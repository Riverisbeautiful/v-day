<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you marry me, River? 💍</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .container { text-align: center; margin-top: 50px; }
        .buttons { position: relative; min-height: 150px; display: flex; justify-content: center; align-items: center; gap: 20px; }
        #warning-text { color: #d63384; font-weight: bold; margin-top: 15px; min-height: 1.2em; }
        #counter-text { color: #666; font-size: 0.9rem; margin-top: 5px; }
        #yes-btn { transition: transform 0.2s; }
        #no-btn { position: absolute; transition: all 0.2s; }
    </style>
</head>
<body>
    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <div class="container">
        <h1>Will you marry me, River? 💍</h1>
        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/t1-kF6eR_S0AAAAi/ring-proposal.gif" alt="proposal">
        </div>

        <div class="buttons">
            <button id="yes-btn">Yes! 💕</button>
            <button id="no-btn">No</button>
        </div>
        
        <p id="warning-text"></p>
        <p id="counter-text">Click "No" 5 times to unlock "Yes"!</p>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const warningText = document.getElementById('warning-text');
        const counterText = document.getElementById('counter-text');
        const catGif = document.getElementById('cat-gif');
        const audio = document.getElementById('bg-music');
        
        let noClicks = 0;
        const targetClicks = 5;
        let yesSize = 1;

        // Audio Helper
        function playAudio() {
            audio.play().catch(e => console.log("Waiting for user interaction..."));
        }

        // Yes Button Logic
        yesBtn.addEventListener('click', () => {
            playAudio();
            if (noClicks >= targetClicks) {
                window.location.href = 'yes.html';
            } else {
                warningText.textContent = "Try pressing no first! 🥺";
            }
        });

        // No Button Logic
        noBtn.addEventListener('click', () => {
            playAudio();
            noClicks++;
            warningText.textContent = ""; 
            
            // Update counter
            if (noClicks < targetClicks) {
                counterText.textContent = `Progress: ${noClicks} / ${targetClicks}`;
            } else {
                counterText.textContent = "You can click Yes now! 💍";
            }
            
            // Movement/Shrinking logic
            yesSize += 0.2;
            yesBtn.style.transform = `scale(${yesSize})`;
            
            const currentNoSize = parseFloat(window.getComputedStyle(noBtn).fontSize);
            noBtn.style.fontSize = (currentNoSize * 0.8) + "px";
            
            noBtn.style.left = Math.random() * 80 + "%";
            noBtn.style.top = Math.random() * 60 + "%";

            catGif.src = "https://media.tenor.com/tC666gJv6-QAAAAi/cat-sad.gif";
        });
    </script>
</body>
</html>
