<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you marry me, River? 💍</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <audio id="bg-music" loop>
        <source src="music/beabadoobee - Glue Song (Lyrics).mp3" type="audio/mpeg">
    </audio>

    <div class="hearts-bg"></div>

    <div class="container">
        <h1>Will you marry me, River? 💍</h1>
        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/t1-kF6eR_S0AAAAi/ring-proposal.gif" alt="proposal">
        </div>
        <div class="buttons">
            <button id="yes-btn">Yes! 💕</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const catGif = document.getElementById('cat-gif');
        const audio = document.getElementById('bg-music');

        // This ensures audio starts playing on the very first click (Yes or No)
        function playAudio() {
            audio.play().catch(e => console.log("Waiting for user interaction..."));
        }

        yesBtn.addEventListener('click', () => {
            playAudio(); // Unlock audio
            window.location.href = 'yes.html';
        });

        noBtn.addEventListener('click', () => {
            playAudio(); // Unlock audio
            // ... [Your existing No button logic here] ...
            noBtn.textContent = ["Are you sure?", "Really sure?", "Think again!", "Last chance!", "But... I love you! 🥺", "Don't break my heart!", "Are you really saying no?"][Math.floor(Math.random() * 7)];
            
            // ... (Your shrinking/moving code) ...
            catGif.src = "https://media.tenor.com/tC666gJv6-QAAAAi/cat-sad.gif";
        });
    </script>
</body>
</html>
