<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Question for You 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        #typewriter-text {
            min-height: 1.2em;
            color: #d63384;
            font-weight: 900;
            margin-bottom: 20px;
            font-size: 2.2rem;
        }
        /* Ensure buttons stay positioned correctly for the movement */
        .buttons {
            position: relative;
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            height: 100px;
        }
    </style>
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1 id="typewriter-text"></h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/t1-kF6eR_S0AAAAi/ring-proposal.gif" alt="proposal">
        </div>

        <div class="buttons">
            <button id="yes-btn">Yes! 💕</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <script>
        // TYPEWRITER EFFECT
        const text = "Will you marry me, River? 💍";
        const element = document.getElementById("typewriter-text");
        let i = 0;
        function typeWriter() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(typeWriter, 100);
            }
        }
        window.onload = typeWriter;

        // ORIGINAL BOUNCY BUTTON LOGIC
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        let yesSize = 1;

        yesBtn.addEventListener('click', () => {
            window.location.href = 'yes.html';
        });

        noBtn.addEventListener('click', () => {
            // Grow Yes button
            yesSize += 0.2;
            yesBtn.style.transform = `scale(${yesSize})`;
            
            // Shrink No button
            const currentNoSize = parseFloat(window.getComputedStyle(noBtn).fontSize);
            noBtn.style.fontSize = (currentNoSize * 0.8) + "px";
            
            // Make No button jump to random positions
            noBtn.style.position = "absolute";
            noBtn.style.left = Math.random() * 80 + "%";
            noBtn.style.top = Math.random() * 80 + "%";
        });
    </script>
</body>
</html>
