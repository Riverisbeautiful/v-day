<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will you marry me?</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hearts-bg"></div>

    <div class="container">
        <h1>Will you marry me, River? 💍</h1>

        <div class="gif-container">
            <img id="cat-gif" src="https://media.tenor.com/t1-kF6eR_S0AAAAi/ring-proposal.gif" alt="proposal">
        </div>

        <div class="buttons">
            <button id="yes-btn">Yes! 💕</button>
            <button id="no-btn">No</button>
        </div>
    </div>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const noBtn = document.getElementById('no-btn');
        const catGif = document.getElementById('cat-gif');
        
        let yesSize = 1;
        const phrases = [
            "Are you sure?",
            "Really sure?",
            "Think again!",
            "Last chance!",
            "But... I love you! 🥺",
            "Don't break my heart!",
            "Are you really saying no?"
        ];

        yesBtn.addEventListener('click', () => {
            window.location.href = 'yes.html';
        });

        noBtn.addEventListener('click', () => {
            // Change button text
            noBtn.textContent = phrases[Math.floor(Math.random() * phrases.length)];
            
            // Grow Yes button
            yesSize += 0.2;
            yesBtn.style.transform = `scale(${yesSize})`;
            
            // Shrink No button
            const currentNoSize = parseFloat(window.getComputedStyle(noBtn).fontSize);
            noBtn.style.fontSize = (currentNoSize * 0.8) + "px";
            
            // Move No button to random position
            noBtn.style.position = "absolute";
            noBtn.style.left = Math.random() * 80 + "%";
            noBtn.style.top = Math.random() * 80 + "%";

            // Update GIF to a "sad/surprised" one
            catGif.src = "https://media.tenor.com/tC666gJv6-QAAAAi/cat-sad.gif";
        });
    </script>
</body>
</html>
